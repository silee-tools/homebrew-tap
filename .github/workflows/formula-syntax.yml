name: Formula Syntax

on:
  pull_request:
    paths:
      - "Formula/**/*.rb"
      - ".github/workflows/formula-syntax.yml"
  push:
    branches:
      - main
    paths:
      - "Formula/**/*.rb"
      - ".github/workflows/formula-syntax.yml"

permissions:
  contents: read

jobs:
  ruby-syntax:
    name: Ruby syntax
    runs-on: self-hosted
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check formula syntax
        run: |
          if ! command -v ruby >/dev/null 2>&1; then
            echo "::warning::ruby is not installed on this self-hosted runner; skipping formula syntax check"
            exit 0
          fi
          ruby --version
          for formula in Formula/*.rb; do
            ruby -c "$formula"
          done
