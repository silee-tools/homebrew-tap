name: Formula Syntax

on:
  pull_request:
    paths:
      - "Formula/**/*.rb"
      - "scripts/check-runtime-channel-contract.sh"
      - ".mise.toml"
      - ".github/workflows/formula-syntax.yml"
  push:
    branches:
      - main
    paths:
      - "Formula/**/*.rb"
      - "scripts/check-runtime-channel-contract.sh"
      - ".mise.toml"
      - ".github/workflows/formula-syntax.yml"

permissions:
  contents: read

jobs:
  ruby-syntax:
    name: Ruby syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Check formula syntax
        shell: bash
        run: |
          shopt -s globstar nullglob
          formulas=(Formula/**/*.rb)

          if [ ${#formulas[@]} -eq 0 ]; then
            echo "No formula files found"
            exit 1
          fi

          for formula in "${formulas[@]}"; do
            ruby -c "$formula"
          done

      - name: Check runtime channel contract
        run: sh scripts/check-runtime-channel-contract.sh
